{% extends 'base/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-{% if is_edit %}edit{% else %}plus{% endif %}"></i> 
                        {{ page_title }}
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post" id="designationForm">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label for="name">Designation Name <span class="text-danger">*</span></label>
                            <input type="text" 
                                   class="form-control" 
                                   id="name" 
                                   name="name" 
                                   value="{{ designation.name|default:'' }}"
                                   placeholder="e.g., Senior Software Engineer"
                                   required>
                        </div>

                        <div class="form-group">
                            <label for="department">Department <span class="text-danger">*</span></label>
                            <select class="form-control" id="department" name="department" required>
                                <option value="">Select Department</option>
                                {% for department in departments %}
                                    <option value="{{ department.id }}" 
                                        {% if designation.department.id == department.id %}selected{% endif %}>
                                        {{ department.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="grade">Grade</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="grade" 
                                   name="grade" 
                                   value="{{ designation.grade|default:'' }}"
                                   placeholder="e.g., A, B, C or Senior, Junior">
                            <small class="form-text text-muted">Optional: Grade level or seniority level</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="basic_salary_min">Minimum Salary ($)</label>
                                    <input type="number" 
                                           class="form-control" 
                                           id="basic_salary_min" 
                                           name="basic_salary_min" 
                                           value="{{ designation.basic_salary_min|default:'0' }}"
                                           step="0.01"
                                           min="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="basic_salary_max">Maximum Salary ($)</label>
                                    <input type="number" 
                                           class="form-control" 
                                           id="basic_salary_max" 
                                           name="basic_salary_max" 
                                           value="{{ designation.basic_salary_max|default:'0' }}"
                                           step="0.01"
                                           min="0">
                                </div>
                            </div>
                        </div>

                        <div class="form-group mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> {% if is_edit %}Update{% else %}Save{% endif %}
                            </button>
                            <a href="{% url 'hr:designation_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('designationForm').addEventListener('submit', function(e) {
        const minSalary = parseFloat(document.getElementById('basic_salary_min').value) || 0;
        const maxSalary = parseFloat(document.getElementById('basic_salary_max').value) || 0;
        
        if (minSalary > maxSalary) {
            e.preventDefault();
            alert('Minimum salary cannot be greater than maximum salary!');
            return false;
        }
    });
</script>
{% endblock %}
